<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>八字 · Reyhan</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#06060e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BaziReyhan">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;900&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#06060e;--surface:#0f0f22;--s2:#151530;--s3:#1a1a3a;
      --border:#1c1c38;--b2:#26264a;
      --gold:#c8953a;--gh:#e8c060;--gl:#6a4a10;
      --text:#ddd5c0;--dim:#7a7060;--dim2:#5a5050;
      --teal:#28a09a;--red:#c03838;
      --wc:#5ac85a;--wb:rgba(30,70,30,.3);--wbd:#3c7a3c;
      --fc:#e06040;--fb:rgba(90,30,10,.3);--fbd:#c05030;
      --ec:#c89040;--eb:rgba(60,44,10,.3);--ebd:#b08030;
      --mc:#b0b0cc;--mb:rgba(55,55,75,.3);--mbd:#9090b0;
      --ac:#4898e0;--ab:rgba(18,50,100,.3);--abd:#3878c8;
    }
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;font-family:'EB Garamond',Georgia,serif;background:var(--bg);color:var(--text);overflow-x:hidden}
    body{background-image:radial-gradient(ellipse 90% 50% at 15% -5%,rgba(120,30,10,.15) 0%,transparent 55%),radial-gradient(ellipse 70% 40% at 85% 105%,rgba(20,80,80,.1) 0%,transparent 55%)}
    .screen{display:none;flex-direction:column;min-height:100svh}
    .screen.active{display:flex}
    .home-top{padding:52px 20px 28px;text-align:center;border-bottom:1px solid var(--border);background:linear-gradient(180deg,rgba(200,149,58,.05),transparent)}
    .home-date{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.3em;color:var(--gl);text-transform:uppercase;margin-bottom:8px}
    .home-greet{font-size:24px}.home-greet span{color:var(--gold)}
    .home-dm{margin-top:7px;font-size:13px;color:var(--dim);font-style:italic}
    .home-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 20px}
    .mandala{width:160px;height:160px;margin-bottom:28px}
    .ring-a{animation:spn 90s linear infinite;transform-origin:80px 80px}
    .ring-b{animation:spnr 45s linear infinite;transform-origin:80px 80px}
    @keyframes spn{to{transform:rotate(360deg)}}
    @keyframes spnr{to{transform:rotate(-360deg)}}
    .read-btn{width:100%;max-width:300px;background:var(--surface);border:1px solid var(--gl);border-radius:22px;cursor:pointer;overflow:hidden;transition:all .3s;position:relative}
    .read-btn:active{border-color:var(--gold);box-shadow:0 0 32px rgba(200,149,58,.2);transform:scale(.97)}
    .btn-main{padding:22px 18px;text-align:center}
    .btn-ico{font-size:30px;display:block;margin-bottom:9px}
    .btn-lbl{font-family:'Cinzel',serif;font-size:16px;letter-spacing:.1em;color:var(--gold);display:block}
    .btn-sub{font-size:13px;color:var(--dim);margin-top:4px;display:block}
    .btn-lp{border-top:1px solid var(--border);padding:9px 18px;display:flex;justify-content:space-between;align-items:center}
    .btn-lp span{font-size:11px;color:var(--dim)}.btn-lp strong{font-size:12px;color:var(--gold)}
    .last-info{margin-top:14px;font-size:12px;color:var(--dim);font-style:italic}
    .rbar{padding:14px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:10}
    .back{width:36px;height:36px;border-radius:50%;flex-shrink:0;background:var(--s2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;color:var(--dim);transition:all .2s}
    .back:active{border-color:var(--gl);color:var(--gold)}
    .rbar-info h2{font-family:'Cinzel',serif;font-size:14px;color:var(--gold)}
    .rbar-info p{font-size:12px;color:var(--dim)}
    .rbody{padding:16px;display:flex;flex-direction:column;gap:13px;padding-bottom:48px}
    .p-hero{background:var(--surface);border:1px solid var(--b2);border-radius:22px;padding:26px 16px;text-align:center;position:relative;overflow:hidden}
    .p-hero::before{content:'';position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:220px;height:220px;background:radial-gradient(circle,rgba(200,149,58,.07),transparent 70%);pointer-events:none}
    .p-hero-lbl{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.28em;color:var(--dim);text-transform:uppercase;margin-bottom:14px}
    .p-chars{display:flex;justify-content:center;align-items:flex-end;gap:18px;margin-bottom:10px}
    .pc .big{font-size:68px;line-height:1;background:linear-gradient(180deg,var(--gh),var(--gold),#5a3808);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .pc .lbl{font-size:11px;color:var(--dim);margin-top:4px}
    .pc-sep{font-size:36px;color:var(--b2);padding-bottom:14px}
    .el-pill{display:inline-block;padding:4px 16px;border-radius:20px;font-size:12px;margin:0 3px 8px}
    .el-wood{background:var(--wb);color:var(--wc);border:1px solid var(--wbd)}
    .el-fire{background:var(--fb);color:var(--fc);border:1px solid var(--fbd)}
    .el-earth{background:var(--eb);color:var(--ec);border:1px solid var(--ebd)}
    .el-metal{background:var(--mb);color:var(--mc);border:1px solid var(--mbd)}
    .el-water{background:var(--ab);color:var(--ac);border:1px solid var(--abd)}
    .ten-god-badge{font-family:'Cinzel',serif;font-size:11px;color:var(--gold);letter-spacing:.12em;margin:6px 0 10px;display:block}
    .special-badge{display:inline-block;background:rgba(200,149,58,.14);border:1px solid var(--gl);color:var(--gold);font-size:11px;padding:5px 16px;border-radius:20px;margin-bottom:10px}
    .why-box{background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-top:12px;text-align:left}
    .why-box .why-lbl{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.22em;color:var(--gl);text-transform:uppercase;margin-bottom:6px}
    .why-box p{font-size:14px;line-height:1.72;color:var(--dim)}
    .branch-note{font-size:13px;color:var(--dim);font-style:italic;line-height:1.65;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
    .score-row{background:var(--surface);border:1px solid var(--b2);border-radius:18px;padding:18px;display:flex;align-items:center;gap:16px}
    .score-n{font-family:'Cinzel Decorative',serif;font-size:50px;color:var(--gold);line-height:1;flex-shrink:0}
    .score-n sub{font-size:16px;color:var(--dim)}
    .score-r{flex:1}
    .score-tag{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.2em;color:var(--dim);text-transform:uppercase;margin-bottom:7px}
    .bar-track{background:var(--s2);border-radius:4px;height:6px;overflow:hidden}
    .bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--gl),var(--gold));transition:width 1.4s cubic-bezier(.22,1,.36,1);width:0%}
    .score-desc{font-size:12px;color:var(--dim);margin-top:6px}
    .dual{display:grid;grid-template-columns:1fr 1fr;gap:11px}
    .half{background:var(--surface);border:1px solid var(--border);border-radius:15px;padding:14px}
    .half-h{border-top:2px solid var(--teal)}.half-c{border-top:2px solid var(--red)}
    .half-ttl{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.15em;text-transform:uppercase;margin-bottom:8px}
    .half-h .half-ttl{color:var(--teal)}.half-c .half-ttl{color:var(--red)}
    .half p{font-size:14px;line-height:1.72;color:var(--dim)}
    .rcard{background:var(--surface);border:1px solid var(--border);border-radius:15px;overflow:hidden}
    .rcard-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px}
    .rcard-head .ico{font-size:16px}
    .rcard-head .ttl{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.16em;color:var(--gold);text-transform:uppercase;flex:1}
    .rcard-body{padding:16px;display:flex;flex-direction:column;gap:10px}
    .rcard-body p{font-size:15px;line-height:1.8;color:var(--text)}
    .hours-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .hour-item{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
    .hour-item.best{border-color:var(--gold);background:rgba(200,149,58,.07)}
    .hour-time{font-family:'Cinzel',serif;font-size:13px;color:var(--gold)}
    .hour-act{font-size:12px;color:var(--dim);margin-top:3px;line-height:1.4}
    .avoid-list{list-style:none;display:flex;flex-direction:column;gap:9px}
    .avoid-list li{display:flex;align-items:flex-start;gap:10px;font-size:15px;line-height:1.7}
    .avoid-dot{width:16px;height:16px;border-radius:50%;background:rgba(192,56,56,.2);border:1px solid var(--red);color:var(--red);font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
    .affirm-box{background:linear-gradient(135deg,rgba(200,149,58,.07),rgba(40,160,154,.05));border:1px solid var(--b2);border-radius:15px;padding:20px;text-align:center}
    .affirm-lbl{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.25em;color:var(--gl);text-transform:uppercase;margin-bottom:14px}
    .affirm-text{font-size:19px;line-height:1.7;color:var(--text);font-style:italic}
    .affirm-text span{color:var(--gold);font-style:normal}
    .lp-card{background:linear-gradient(135deg,rgba(58,20,5,.3),rgba(5,20,58,.2));border:1px solid var(--b2);border-radius:15px;overflow:hidden}
    .lp-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px}
    .lp-head .ico{font-size:16px}
    .lp-head .ttl{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.16em;color:var(--gold);text-transform:uppercase}
    .lp-body{padding:16px}
    .lp-row{display:flex;align-items:flex-start;gap:14px;margin-bottom:12px}
    .lp-hanzi{font-size:44px;background:linear-gradient(160deg,var(--gh),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;flex-shrink:0}
    .lp-meta{flex:1}
    .lp-meta h3{font-size:15px;color:var(--text);margin-bottom:4px}
    .lp-meta p{font-size:13px;color:var(--dim);line-height:1.65}
    .lp-context{font-size:15px;line-height:1.78;color:var(--text)}
    .lp-tags{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
    .lp-tag{padding:4px 12px;border-radius:20px;font-size:11px;background:var(--s2);border:1px solid var(--b2);color:var(--dim)}
    .lp-tag.hot{border-color:var(--gl);color:var(--gold)}
    .chart-toggle{background:var(--surface);border:1px solid var(--border);border-radius:15px;overflow:hidden}
    .ct-btn{width:100%;padding:14px 16px;background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:10px;text-align:left}
    .ct-btn .ico{font-size:15px}
    .ct-btn .ttl{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.16em;color:var(--gold);text-transform:uppercase;flex:1}
    .ct-btn .arr{font-size:13px;color:var(--dim);transition:transform .25s}
    .ct-btn.open .arr{transform:rotate(180deg)}
    .ct-content{display:none;padding:0 16px 16px}
    .ct-content.open{display:block}
    .pm-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px}
    .pm{text-align:center;background:var(--s2);border:1px solid var(--border);border-radius:9px;padding:9px 4px}
    .pm .pm-l{font-size:8px;color:var(--dim);margin-bottom:4px}
    .pm .pm-s{font-size:20px;color:var(--gold);line-height:1}
    .pm .pm-b{font-size:20px;color:var(--dim);line-height:1;margin-top:2px}
    .pm .pm-n{font-size:8px;color:var(--dim);margin-top:3px;line-height:1.3}
    .chart-note{font-size:13px;color:var(--dim);line-height:1.65;font-style:italic}
    .section-divider{display:flex;align-items:center;gap:10px;margin:4px 0}
    .section-divider::before,.section-divider::after{content:'';flex:1;border-top:1px solid var(--border)}
    .section-divider span{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.2em;color:var(--dim2);text-transform:uppercase}
    .rv{opacity:0;filter:blur(18px) brightness(.6);transform:scale(.93) translateY(22px);transition:opacity .7s cubic-bezier(.22,1,.36,1),filter .7s cubic-bezier(.22,1,.36,1),transform .7s cubic-bezier(.22,1,.36,1)}
    .rv.in{opacity:1;filter:blur(0px) brightness(1);transform:scale(1) translateY(0)}
    .offline-badge{position:fixed;bottom:14px;right:14px;background:var(--s2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:11px;color:var(--dim);z-index:100}

    /* ══ ANIMATION SYSTEM ══════════════════════════ */

    /* Stagger delay classes */
    .rv:nth-child(1){transition-delay:.05s}
    .rv:nth-child(2){transition-delay:.1s}
    .rv:nth-child(3){transition-delay:.15s}
    .rv:nth-child(4){transition-delay:.2s}
    .rv:nth-child(5){transition-delay:.25s}
    .rv:nth-child(6){transition-delay:.3s}
    .rv:nth-child(7){transition-delay:.35s}
    .rv:nth-child(8){transition-delay:.4s}
    .rv:nth-child(9){transition-delay:.45s}
    .rv:nth-child(10){transition-delay:.5s}
    .rv:nth-child(n+11){transition-delay:.55s}

    /* 3D Lift — cards */
    .rcard, .half, .score-row, .p-hero, .lp-card, .affirm-box, .chart-toggle {
      transition: transform .22s cubic-bezier(.34,1.56,.64,1),
                  box-shadow .22s ease;
      transform-style: preserve-3d;
      will-change: transform;
    }
    .rcard.lifted, .half.lifted, .score-row.lifted,
    .p-hero.lifted, .lp-card.lifted, .affirm-box.lifted {
      transform: translateY(-5px) scale(1.012);
      box-shadow: 0 12px 40px rgba(200,149,58,.18), 0 4px 12px rgba(0,0,0,.4);
    }

    /* Gold glow pulse */
    @keyframes goldGlow {
      0%   { box-shadow: 0 0 0 0 rgba(200,149,58,.0); }
      30%  { box-shadow: 0 0 20px 4px rgba(200,149,58,.35); }
      100% { box-shadow: 0 0 0 0 rgba(200,149,58,.0); }
    }
    .glow-pulse { animation: goldGlow .7s ease-out forwards; }

    /* Ripple */
    .ripple-host { position: relative; overflow: hidden; }
    .ripple {
      position: absolute; border-radius: 50%;
      background: radial-gradient(circle, rgba(200,149,58,.45) 0%, transparent 70%);
      transform: scale(0); pointer-events: none;
      animation: rippleOut .65s cubic-bezier(.22,1,.36,1) forwards;
    }
    @keyframes rippleOut {
      to { transform: scale(4); opacity: 0; }
    }

    /* Read button special glow */
    .read-btn {
      transition: transform .25s cubic-bezier(.34,1.56,.64,1),
                  border-color .25s ease, box-shadow .25s ease !important;
    }
    .read-btn.lifted {
      transform: translateY(-6px) scale(1.02);
      border-color: var(--gold);
      box-shadow: 0 0 40px rgba(200,149,58,.28), 0 8px 24px rgba(0,0,0,.5);
    }

    /* Mist canvas */
    #mist-canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none; opacity: .55;
      mix-blend-mode: screen;
    }
    .home-body { position: relative; }

    /* Score bar shimmer */
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    .bar-fill {
      background: linear-gradient(90deg,
        var(--gl) 0%, var(--gold) 40%,
        var(--gh) 60%, var(--gold) 80%, var(--gl) 100%);
      background-size: 200% auto;
      animation: shimmer 3s linear infinite;
    }

    /* Section divider pulse dot */
    .section-divider span {
      position: relative;
    }
    .section-divider span::before {
      content: '✦';
      position: absolute; left: -16px;
      animation: pulseDot 2s ease-in-out infinite;
      opacity: .5;
    }
    @keyframes pulseDot {
      0%,100% { opacity:.2; transform:scale(.8); }
      50%      { opacity:.8; transform:scale(1.2); }
    }

    /* Mandala extra glow ring */
    @keyframes glowRing {
      0%,100% { opacity:.08; r:78px; }
      50%     { opacity:.22; r:74px; }
    }
    #glow-ring { animation: glowRing 3s ease-in-out infinite; }

    /* Ten god badge shimmer */
    .ten-god-badge {
      background: linear-gradient(90deg, var(--gl), var(--gold), var(--gh), var(--gold), var(--gl));
      background-size: 300% auto;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s linear infinite;
    }


    /* ══ ENHANCED ANIMATIONS ═══════════════════════ */

    /* Lifted state — more pronounced */
    .rcard.lifted, .half.lifted, .score-row.lifted,
    .p-hero.lifted, .lp-card.lifted, .affirm-box.lifted,
    .hour-item.lifted, .chart-toggle.lifted {
      transform: translateY(-7px) scale(1.018) !important;
      box-shadow: 0 16px 48px rgba(200,149,58,.22),
                  0 6px 16px rgba(0,0,0,.5),
                  inset 0 0 0 1px rgba(200,149,58,.25) !important;
      z-index: 2;
    }
    .read-btn.lifted {
      transform: translateY(-8px) scale(1.025) !important;
      border-color: var(--gold) !important;
      box-shadow: 0 0 50px rgba(200,149,58,.35),
                  0 12px 30px rgba(0,0,0,.5) !important;
    }

    /* Gold glow — bigger, more visible */
    @keyframes goldGlow2 {
      0%   { box-shadow: 0 0 0 0 rgba(200,149,58,.0), 0 0 0 0 rgba(200,149,58,.0); }
      25%  { box-shadow: 0 0 30px 6px rgba(200,149,58,.4), 0 0 60px 10px rgba(200,149,58,.15); }
      100% { box-shadow: 0 0 0 0 rgba(200,149,58,.0), 0 0 0 0 rgba(200,149,58,.0); }
    }
    .glow-pulse { animation: goldGlow2 .8s ease-out forwards !important; }

    /* Ripple keyframe (redefined) */
    @keyframes rippleOut {
      0%   { transform: scale(0); opacity: 1; }
      100% { transform: scale(1); opacity: 0; }
    }

    /* Mist canvas — more visible */
    #mist-canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      opacity: .8;
      mix-blend-mode: screen;
    }

    /* Cards transition smoothness */
    .rcard, .half, .score-row, .p-hero,
    .lp-card, .affirm-box, .chart-toggle, .hour-item {
      transition:
        transform .28s cubic-bezier(.34,1.56,.64,1),
        box-shadow .28s ease !important;
      will-change: transform;
    }


    /* ══ SECTION DETAIL GRIDS ══════════════════════ */
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
      margin-top: 4px;
    }
    .dg-cell {
      background: var(--s2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 11px;
      transition: transform .22s cubic-bezier(.34,1.56,.64,1),
                  box-shadow .22s ease, border-color .22s ease;
    }
    .dg-cell:active, .dg-cell.lifted {
      transform: translateY(-4px) scale(1.03);
      border-color: var(--gold);
      box-shadow: 0 8px 24px rgba(200,149,58,.18);
    }
    .dg-cell.accent-teal  { border-top: 2px solid var(--teal); }
    .dg-cell.accent-red   { border-top: 2px solid var(--red); }
    .dg-cell.accent-gold  { border-top: 2px solid var(--gold); }
    .dg-cell.accent-dim   { border-top: 2px solid var(--border2); }
    .dg-cell.wide {
      grid-column: 1 / -1;
    }
    .dg-ico  {
      font-size: 20px;
      margin-bottom: 6px;
      display: block;
    }
    .dg-lbl {
      font-family: 'Cinzel', serif;
      font-size: 8px;
      letter-spacing: .18em;
      color: var(--gl);
      text-transform: uppercase;
      display: block;
      margin-bottom: 5px;
    }
    .dg-txt {
      font-size: 14px;
      line-height: 1.65;
      color: var(--text);
    }
    .dg-txt.dim { color: var(--dim); }
    .dg-bar-wrap {
      margin-top: 6px;
      background: var(--surface);
      border-radius: 4px;
      height: 4px;
      overflow: hidden;
    }
    .dg-bar {
      height: 100%;
      border-radius: 4px;
      transition: width 1.2s cubic-bezier(.22,1,.36,1);
    }
    .dg-bar.gold  { background: linear-gradient(90deg, var(--gl), var(--gold)); }
    .dg-bar.teal  { background: linear-gradient(90deg, #14605c, var(--teal)); }
    .dg-bar.red   { background: linear-gradient(90deg, #601010, var(--red)); }
    .dg-tag {
      display: inline-block;
      padding: 2px 9px;

  {ico:'⚡',lbl:'Level & Pola Energi',txt:'<p>Energimu terasa penuh di pagi hari tapi bisa tiba-tiba drop di sore hari karena dua sumber Kayu saling "berkompetisi". Rencanakan pekerjaan terpenting di rentang <strong style="color:var(--gold)">07:00–13:00</strong>, dan sisakan waktu lebih santai setelah jam 15:00.</p>',accent:'teal',bar:{pct:62,cls:'teal'}},
  {ico:'🏃',lbl:'Aktivitas yang Dianjurkan',txt:'<p>Olahraga yang melibatkan gerakan dan koordinasi — lari ringan, bersepeda, atau olahraga tim. Hindari latihan yang sangat kompetitif karena bisa memperburuk energi 比肩 yang sudah tegang. Tujuannya adalah melepas, bukan menang.</p>',accent:'dim'},
  {ico:'🍽️',lbl:'Makanan & Minuman Hari Ini',txt:'<p>Elemen Kayu yang dominan berarti tubuhmu butuh makanan yang <strong style="color:var(--gold)">menetralisir dan menenangkan Liver</strong>. Dianjurkan: sayuran hijau (bayam, brokoli), teh chamomile atau peppermint, dan makanan yang tidak terlalu berminyak. Hindari alkohol dan makanan pedas berlebihan — keduanya membebani Liver.</p>',accent:'teal',wide:true},
  {ico:'🕐',lbl:'Chinese Body Clock — Jam Aktif',txt:'<p><strong style="color:var(--gold)">01:00–03:00</strong> adalah jam Liver dalam Chinese Body Clock — organ ini melakukan regenerasi di jam tersebut. Pastikan kamu sudah tidur sebelum tengah malam agar Liver dapat bekerja optimal. Kalau kamu sering terbangun di jam 1–3 pagi, itu sinyal Liver sedang kelebihan beban.</p>',accent:'gold'},
  {ico:'⚠️',lbl:'Pantangan Kesehatan',txt:'<p>Hindari makan terburu-buru, begadang, dan paparan stres yang tidak perlu. Tiga hal ini langsung melemahkan sistem Liver-Empedu yang sudah bekerja keras hari ini.</p>',accent:'red',tag:'warn'},
],
finance:[
  {ico:'📉',lbl:'Arus Rezeki',txt:'<p>Energi 比肩 cenderung "membelah" rezeki — seperti satu sumber air yang harus mengalir ke dua pohon sekaligus. Rezeki yang kamu hasilkan hari ini berpotensi harus "dibagi" dengan orang lain, baik secara literal maupun figuratif.</p>',accent:'gold',bar:{pct:38,cls:'red'}},
  {ico:'📊',lbl:'Tipe Investasi yang Sesuai',txt:'<p>Hari ini bukan untuk membuka posisi baru. Tapi kalau kamu ingin melakukan sesuatu, fokuslah pada <strong style="color:var(--gold)">review portofolio yang sudah ada</strong> — evaluasi kinerja, bukan eksekusi baru. Investasi terbaik hari ini adalah waktu untuk riset dan pemahaman yang lebih dalam.</p>',accent:'dim'},
  {ico:'🔒',lbl:'Proteksi Finansial',txt:'<p>Pastikan kamu tidak meminjamkan uang hari ini, dan berhati-hati dengan pengeluaran yang dipicu oleh "melihat orang lain beli sesuatu". Energi 比肩 sering memunculkan pengeluaran kompetitif yang tidak perlu — beli karena FOMO, bukan karena butuh.</p>',accent:'red',tag:'warn'},
  {ico:'🔢',lbl:'Angka & Arah Beruntung',txt:'${makeCompass("SE","Tenggara (SE) — Arah Sukses Kua 1","Untuk urusan finansial hari ini, posisikan dirimu menghadap Tenggara. Angka beruntung: 3, 8 (angka elemen Kayu dalam numerologi Bazi).")}',accent:'teal',wide:true,raw:true},
  {ico:'💡',lbl:'Insight Finansial',txt:'<p>Uang yang keluar hari ini besar kemungkinan adalah "investasi relasi" — kamu mentraktir, membantu, atau menanggung biaya orang lain. Anggap saja sebagai tabungan relasi jangka panjang, bukan kerugian.</p>',accent:'gold'},
  {ico:'✅',lbl:'Satu Aksi Finansial Terbaik',txt:'<p>Lunasi satu kewajiban finansial yang sudah jatuh tempo atau hampir jatuh tempo. Membersihkan hutang di hari 比肩 memberikan "ruang napas" finansial yang akan terasa di hari-hari berikutnya.</p>',accent:'teal'},
],
romance:[
  {ico:'🔥',lbl:'Vibrasi Relasi Hari Ini',txt:'<p>Pertemuan dengan seseorang yang "mirip banget" denganmu hari ini akan terasa sangat intens — bisa jadi koneksi yang sangat dalam, atau justru gesekan yang mengejutkan karena dua karakter kuat bertemu. Ini bukan kebetulan, ini sinyal dari energi hari ini.</p>',accent:'gold'},
  {ico:'💬',lbl:'Cara Komunikasi Terbaik',txt:'<p>Komunikasi <strong style="color:var(--gold)">tatap muka langsung</strong> jauh lebih efektif dari chat atau pesan teks hari ini. Energi 比肩 butuh "melihat" lawan bicara untuk merasakan kesetaraan — pesan teks terlalu mudah disalahartikan dan memicu miskomunikasi hari ini.</p>',accent:'teal',wide:true},
  {ico:'💎',lbl:'Kekuatan Relasi Hari Ini',txt:'<p>Jika bertemu seseorang yang benar-benar satu visi denganmu, koneksi yang terbentuk hari ini bisa sangat kuat dan tahan lama. Energi 比肩 menciptakan "chemistry instan" antara jiwa-jiwa yang setara.</p>',accent:'gold',tag:'good'},
  {ico:'⚡',lbl:'Potensi Gesekan',txt:'<p>Dua orang yang sama-sama determined dan straight-forward bisa dengan mudah berubah dari diskusi menjadi debat. Sinyal bahaya: ketika kamu mulai merasa "aku yang benar" — mundur satu langkah, tarik napas, dan tanya: "apakah ini perlu diperdebatkan sekarang?"</p>',accent:'red',tag:'warn'},
  {ico:'📍',lbl:'Lokasi & Aktivitas Ideal',txt:'<p>Aktivitas yang melibatkan <strong style="color:var(--gold)">gerakan dan alam terbuka</strong> sangat dianjurkan — hiking ringan, bersepeda bersama, atau sekadar jalan sore di taman. Energi Kayu butuh ruang dan alam untuk tetap harmonis. Hindari tempat yang ramai, bising, atau penuh kompetisi seperti game center.</p>',accent:'teal',wide:true},
  {ico:'🕊️',lbl:'Insight untuk Relasi',txt:'<p>Orang yang hadir dalam hidupmu hari ini — entah teman lama yang tiba-tiba muncul atau kenalan baru yang terasa familiar — membawa pesan tentang sisi dirimu yang perlu diakui. Perhatikan apa yang kamu kagumi atau tidak suka dari mereka: itulah yang sedang kamu proses dalam dirimu sendiri.</p>',accent:'dim'},
],},

career:[
  {ico:'🛡️',lbl:'Mode Hari Ini',txt:'<p>Hari ini adalah hari untuk <strong style="color:var(--gold)">bertahan dengan cerdas</strong>, bukan menyerang. Energi 劫财 bukan berarti kamu lemah — melainkan medan hari ini tidak menguntungkan untuk inisiatif besar. Seperti seorang prajurit yang tahu kapan harus bertahan di balik perisai.</p>',accent:'dim'},
  {ico:'🔍',lbl:'Tipe Pekerjaan Cocok',txt:'<p>Pekerjaan <strong style="color:var(--gold)">koordinasi, support, dan administrasi</strong> berjalan paling baik hari ini. Membantu rekan, menyelesaikan backlog, atau mengerjakan tugas-tugas yang selama ini tertunda karena tidak sempat. Kontribusi yang "tidak terlihat besar" hari ini justru punya nilai tersendiri.</p>',accent:'teal'},
  {ico:'👥',lbl:'Dinamika dengan Atasan & Tim',txt:'<p>Waspada dengan rekan yang tanpa sadar — atau dengan sadar — "menumpang" pada hasil kerjamu hari ini. Tidak perlu konfrontasi, tapi mulailah mendokumentasikan kontribusimu secara lebih jelas. Dengan atasan: hari ini bukan waktu yang tepat untuk minta kenaikan atau promosi.</p>',accent:'red',wide:true,tag:'warn'},
  {ico:'🚫',lbl:'Yang Harus Dihindari',txt:'<p>Memulai proyek atau deal baru, menyetujui komitmen tambahan yang menguras tenaga, dan terlibat dalam diskusi yang tidak ada ujungnya. Energimu hari ini adalah sumber daya terbatas — alokasikan dengan sangat bijak.</p>',accent:'red'},
  {ico:'📁',lbl:'Fokus Aksi',txt:'<p>Selesaikan satu pekerjaan penting yang sudah hampir tuntas. Kepuasan menyelesaikan sesuatu hari ini jauh lebih berharga daripada memulai sepuluh hal baru.</p>',accent:'gold'},
  {ico:'💡',lbl:'Insight untuk Harimu',txt:'<p>Hari 劫财 adalah pengingat bahwa <strong style="color:var(--gold)">tidak semua energi perlu diberikan kepada dunia luar</strong>. Ada saatnya kamu perlu menjaga "cadangan" untuk dirimu sendiri. Batas bukan berarti egois — batas adalah bentuk self-respect yang paling dasar.</p>',accent:'teal',wide:true},
],
health:[
  {ico:'🌿',lbl:'Organ yang Perlu Perhatian',txt:'<p>Hati, sistem imun, dan sistem pencernaan semuanya dalam kondisi "sedang tertekan" hari ini. Tanda-tandanya bisa berupa rasa lelah yang tidak proporsional dengan aktivitas, atau mood yang mudah berubah tanpa sebab yang jelas.</p>',accent:'gold',bar:{pct:42,cls:'red'}},
  {ico:'🔋',lbl:'Level & Pola Energi',txt:'<p>Energi tidak stabil dan mudah terkuras — terutama setelah interaksi sosial yang intense. Jika kamu merasa tiba-tiba kelelahan setelah bertemu atau berbicara dengan seseorang tertentu hari ini, itu adalah sinyal bahwa orang tersebut sedang "menarik" energimu.</p>',accent:'red',bar:{pct:40,cls:'red'}},
  {ico:'🧘',lbl:'Aktivitas yang Dianjurkan',txt:'<p>Yoga restoratif, meditasi 10–15 menit, atau sekadar berjalan kaki perlahan di alam terbuka. Tujuannya bukan membakar kalori — tapi mengisi ulang cadangan energi. Hindari olahraga kompetitif atau yang sangat menguras tenaga.</p>',accent:'dim'},
  {ico:'🍵',lbl:'Makanan & Minuman Hari Ini',txt:'<p>Fokus pada makanan yang <strong style="color:var(--gold)">memperkuat sistem imun dan menenangkan pencernaan</strong>: jahe hangat, madu, sup sayuran, dan makanan fermentasi seperti yogurt atau kimchi dalam porsi kecil. Hindari kopi berlebihan dan makanan cepat saji — keduanya menguras energi yang sudah terbatas.</p>',accent:'teal',wide:true},
  {ico:'🕐',lbl:'Chinese Body Clock — Jam Aktif',txt:'<p><strong style="color:var(--gold)">19:00–21:00</strong> adalah jam Perikardium (Pericardium) — organ pelindung jantung dalam TCM. Di jam ini tubuhmu paling butuh ketenangan dan kehangatan emosional. Habiskan waktu ini untuk hal-hal yang menenangkan: baca buku, ngobrol santai dengan orang yang kamu percaya, atau minum teh hangat.</p>',accent:'gold'},
  {ico:'😴',lbl:'Pantangan Kesehatan',txt:'<p>Begadang adalah pantangan utama hari ini — tubuhmu membutuhkan recovery yang lebih panjang dari biasanya. Target tidur sebelum jam 22:30 untuk memberi sistem imunmu waktu regenerasi yang cukup.</p>',accent:'red',tag:'warn'},
],
finance:[
  {ico:'📉',lbl:'Arus Rezeki',txt:'<p>Ini adalah hari dengan arus finansial yang paling "bocor" dalam siklus 10 hari. Bukan berarti kamu pasti rugi — tapi ada kecenderungan kuat untuk uang keluar lebih banyak dari yang masuk, seringkali melalui jalur yang tidak terduga.</p>',accent:'red',bar:{pct:22,cls:'red'}},
  {ico:'📊',lbl:'Tipe Investasi yang Sesuai',txt:'<p>Tidak ada investasi yang ideal untuk dieksekusi hari ini. Namun ini waktu yang baik untuk <strong style="color:var(--gold)">evaluasi investasi yang sudah berjalan</strong> — apakah ada yang perlu di-rebalance atau dihentikan? Keputusan untuk keluar dari investasi yang buruk justru bisa menguntungkan di hari ini.</p>',accent:'dim'},
  {ico:'🛡️',lbl:'Proteksi Finansial',txt:'<p>Jangan meminjamkan uang dalam jumlah apapun hari ini. Jika ada yang meminta bantuan finansial, kamu bisa berempati tanpa harus mengeluarkan uang — tawarkan bantuan dalam bentuk lain, atau tunda keputusan sampai hari yang lebih baik.</p>',accent:'red',tag:'warn'},
  {ico:'🔢',lbl:'Angka & Arah Beruntung',txt:'${makeCompass("E","Timur (E) — Arah Kesehatan Kua 1","Hari ini fokus ke arah Timur untuk urusan yang berkaitan dengan perlindungan dan kesehatan. Angka: hindari transaksi di angka 4 dan 9 hari ini — keduanya berhubungan dengan elemen Metal yang clash dengan Wood-mu.")}',accent:'teal',wide:true,raw:true},
  {ico:'💡',lbl:'Insight Finansial',txt:'<p>Pengeluaran yang terjadi hari ini kemungkinan besar adalah "biaya relasi" — mentraktir, membantu, atau menanggung sesuatu untuk orang lain. Catat semuanya, bukan untuk disesali, tapi untuk memahami pola: apakah ini pilihan sadar atau kebiasaan yang sudah terlalu sering terjadi?</p>',accent:'gold'},
  {ico:'✅',lbl:'Satu Aksi Finansial Terbaik',txt:'<p>Audit pengeluaran bulan ini — cukup 10 menit. Lihat ke mana uangmu mengalir dan identifikasi satu "kebocoran" yang bisa kamu tutup mulai hari ini.</p>',accent:'dim'},
],
romance:[
  {ico:'🌊',lbl:'Vibrasi Relasi Hari Ini',txt:'<p>Empatimu hari ini berada di level yang sangat tinggi — kamu bisa merasakan kondisi emosional orang lain bahkan sebelum mereka mengatakannya. Ini adalah anugerah, tapi juga bisa menjadi beban kalau kamu tidak punya batasan yang jelas antara perasaanmu dan perasaan orang lain.</p>',accent:'teal'},
  {ico:'💬',lbl:'Cara Komunikasi Terbaik',txt:'<p>Komunikasi melalui <strong style="color:var(--gold)">tindakan kecil yang tulus</strong> jauh lebih berkesan hari ini daripada kata-kata yang panjang. Membuatkan minuman, mengirimkan pesan singkat yang thoughtful, atau sekadar hadir — itu lebih bermakna dari ungkapan yang elaborate.</p>',accent:'gold',wide:true},
  {ico:'💝',lbl:'Kekuatan Relasi',txt:'<p>Kebaikan dan kepedulianmu yang genuine sangat terasa hari ini. Orang-orang di sekitarmu akan merasakan kehangatan dan ketulusan yang kamu pancarkan — bahkan tanpa kamu sadari.</p>',accent:'teal',tag:'good'},
  {ico:'⚡',lbl:'Potensi Gesekan',txt:'<p>Waspada dinamika di mana satu pihak terus memberi dan pihak lain terus mengambil. Jika kamu merasa mulai lelah atau "kosong" setelah berinteraksi dengan seseorang hari ini — itu adalah sinyal penting yang perlu kamu dengarkan.</p>',accent:'red',tag:'warn'},
  {ico:'📍',lbl:'Lokasi & Aktivitas Ideal',txt:'<p>Tempat yang <strong style="color:var(--gold)">tenang, nyaman, dan akrab</strong> — rumah, kafe favorit, atau taman kecil yang sudah kamu kenal. Bukan hari untuk eksplorasi tempat baru atau aktivitas yang penuh adrenalin. Kenyamanan dan familiaritas adalah energi yang kamu butuhkan hari ini.</p>',accent:'dim',wide:true},
  {ico:'🤲',lbl:'Insight untuk Relasi',txt:'<p>Belajar untuk menerima dengan sama mudahnya kamu memberi adalah pelajaran terbesar hari ini. Jika seseorang ingin melakukan sesuatu untukmu hari ini — biarkan mereka. Itu adalah cara mereka mengekspresikan cinta, dan menolaknya justru bisa menyakiti mereka.</p>',accent:'gold'},
],},

/* 2: 丙 食神 Eating God */

career:[
  {ico:'🌟',lbl:'Momentum Hari Ini',txt:'<p>Ini adalah hari di mana kata-katamu punya <strong style="color:var(--gold)">bobot dan daya tarik yang lebih besar dari biasanya</strong>. Ide yang sama persis, jika kamu sampaikan hari ini versus hari biasa, akan terdengar jauh lebih meyakinkan. Itu bukan kebetulan — itu energi 食神 yang bekerja untukmu.</p>',accent:'gold',tag:'good'},
  {ico:'🎯',lbl:'Tipe Pekerjaan Cocok',txt:'<p>Semua pekerjaan yang melibatkan <strong style="color:var(--gold)">komunikasi, kreasi, dan ekspresi</strong>: presentasi, pitching, menulis proposal, membuat konten, mengajar, atau coaching. Jika pekerjaanmu melibatkan berbicara kepada orang lain — ini adalah harimu.</p>',accent:'teal'},
  {ico:'🤝',lbl:'Dinamika dengan Atasan & Tim',txt:'<p>Energimu yang hangat dan natural hari ini membuat orang merasa nyaman dan terinspirasi di sekitarmu. Atasan akan mudah menyetujui ide yang kamu presentasikan. Tim akan termotivasi oleh cara kamu menyampaikan sesuatu. Gunakan momentum ini untuk hal-hal yang selama ini kamu tunda karena takut ditolak.</p>',accent:'teal',wide:true},
  {ico:'💡',lbl:'Fokus Aksi',txt:'<p>Sampaikan ide terpentingmu hari ini. Jadwalkan meeting atau call yang selama ini tertunda. Kirimkan proposal yang sudah lama kamu siapkan. Momentum ini hanya hadir setiap 10 hari sekali.</p>',accent:'gold'},
  {ico:'⏰',lbl:'Yang Harus Dihindari',txt:'<p>Menghabiskan hari ini untuk pekerjaan administratif yang bisa dikerjakan kapan saja. Energi 食神 yang terbuang untuk hal-hal rutin adalah pemborosan terbesar yang bisa kamu lakukan hari ini.</p>',accent:'red'},
  {ico:'💡',lbl:'Insight untuk Harimu',txt:'<p>食神 mengajarkan bahwa <strong style="color:var(--gold)">ekspresi diri yang autentik adalah bentuk produktivitas tertinggi</strong>. Hari ini bukan tentang kerja keras — tapi tentang kerja yang mengalir natural dari dalam dirimu. Kalau sesuatu terasa dipaksakan hari ini, mungkin itu bukan yang seharusnya kamu kerjakan.</p>',accent:'teal',wide:true},
],
health:[
  {ico:'❤️',lbl:'Organ yang Perlu Perhatian',txt:'<p>Jantung dan sistem sirkulasi darah berada dalam kondisi prima hari ini — elemen Api mendukung dan memperkuat organ-organ ini. Tubuhmu terasa lebih "hidup" dari biasanya, dan itu adalah sinyal positif yang bisa kamu manfaatkan.</p>',accent:'gold',bar:{pct:88,cls:'gold'}},
  {ico:'⚡',lbl:'Level & Pola Energi',txt:'<p>Energi tinggi dan stabil sepanjang hari — tidak ada penurunan mendadak yang biasanya terjadi di sore hari. Manfaatkan ini dengan menjadwalkan aktivitas terpentingmu di rentang yang lebih lebar dari biasanya: pagi hingga petang semua kondusif.</p>',accent:'teal',bar:{pct:88,cls:'teal'}},
  {ico:'🏋️',lbl:'Aktivitas yang Dianjurkan',txt:'<p>Ini adalah hari terbaik untuk olahraga intens yang selama ini kamu tunda. HIIT, lari jarak menengah, futsal, atau berenang. Tubuhmu siap dan sistem kardiovaskularmu mendukung. Kamu tidak akan merasa kepayahan seperti hari biasa.</p>',accent:'dim'},
  {ico:'🍊',lbl:'Makanan & Minuman Hari Ini',txt:'<p>Elemen Api yang kuat hari ini mendukung metabolisme yang cepat. Manfaatkan dengan konsumsi <strong style="color:var(--gold)">makanan bernutrisi tinggi yang menghasilkan energi berkelanjutan</strong>: nasi merah, kacang-kacangan, buah citrus, dan protein lean. Tubuhmu bisa memproses nutrisi dengan lebih efisien hari ini. Minimalkan gula sederhana karena energi sudah cukup tinggi.</p>',accent:'teal',wide:true},
  {ico:'🕐',lbl:'Chinese Body Clock — Jam Aktif',txt:'<p><strong style="color:var(--gold)">11:00–13:00</strong> adalah jam Jantung dalam Chinese Body Clock — dan ini bertepatan dengan Branch 午 (Horse/Api) yang juga merupakan Day Branch kelahiranmu. Ini menjadikan jam 11–13 sebagai <strong style="color:var(--gold)">jam paling powerful dalam harimu</strong> di hari 丙. Jadwalkan aktivitas terpentingmu di sini.</p>',accent:'gold'},
  {ico:'⚠️',lbl:'Pantangan Kesehatan',txt:'<p>Jangan over-stimulasi dengan kafein berlebihan — energimu sudah sangat tinggi dan menambah stimulan justru bisa membuatmu sulit tidur malam ini. Pastikan kamu tetap terhidrasi karena aktivitas tinggi meningkatkan kebutuhan air.</p>',accent:'dim'},
],
finance:[
  {ico:'📈',lbl:'Arus Rezeki',txt:'<p>Rezeki hari ini mengalir dari <strong style="color:var(--gold)">ekspresi dan kreativitasmu</strong> — bukan dari kerja keras fisik. Artinya, peluang finansial terbesar hari ini datang dari kemampuanmu berkomunikasi, meyakinkan, dan menunjukkan nilai dirimu kepada orang yang tepat.</p>',accent:'teal',bar:{pct:82,cls:'teal'}},
  {ico:'💼',lbl:'Tipe Peluang Finansial',txt:'<p>Negosiasi gaji atau rate, pitching proyek freelance, closing sales, atau mempresentasikan proposal bisnis — semua ini sangat ideal dilakukan hari ini. Kemampuan persuasimu sedang di puncak, dan orang lebih mudah mengatakan "ya" pada hari 食神.</p>',accent:'gold',tag:'good'},
  {ico:'⚠️',lbl:'Yang Perlu Diwaspadai',txt:'<p>Mood yang sangat baik hari ini bisa membuatmu impulsif dalam pengeluaran — "hari bagus, ayo belanja". Nikmati momen ini tapi tetap pertahankan kesadaran finansialmu. Rezeki yang masuk hari ini lebih baik diinvestasikan, bukan langsung dihabiskan.</p>',accent:'red'},
  {ico:'🔢',lbl:'Angka & Arah Beruntung',txt:'${makeCompass("S","Selatan (S) — Arah Cinta & Kreativitas Kua 1","Untuk urusan finansial yang melibatkan presentasi atau negosiasi hari ini, posisikan menghadap Selatan. Angka beruntung: 2, 7 (angka elemen Api dalam numerologi Bazi). Warna merah atau oranye pada pakaian hari ini mendukung energi 丙.")}',accent:'teal',wide:true,raw:true},
  {ico:'💡',lbl:'Insight Finansial',txt:'<p>Investasi terbaik yang bisa kamu lakukan hari ini adalah investasi pada <strong style="color:var(--gold)">kemampuan presentasi dan komunikasimu</strong> — beli buku, ikuti webinar, atau minta feedback tentang cara kamu menyampaikan ide. Skill ini adalah aset yang menghasilkan returns untuk seumur hidup.</p>',accent:'gold'},
  {ico:'✅',lbl:'Satu Aksi Finansial Terbaik',txt:'<p>Kirimkan satu proposal, penawaran, atau negosiasi yang selama ini kamu tunda karena takut. Hari ini kemungkinan mendapat respons positif jauh lebih tinggi dari biasanya.</p>',accent:'teal'},
],

  {ico:'🔋',lbl:'Level & Pola Energi',txt:'<p>Energi terasa stabil seperti lilin yang terbakar dengan merata — bukan api unggun yang menyala besar tapi cepat habis. Manfaatkan ini untuk pekerjaan yang membutuhkan fokus panjang dan konsisten, bukan untuk sprint intens yang memerlukan ledakan energi.</p>',accent:'teal',bar:{pct:70,cls:'teal'}},

  {ico:'🕐',lbl:'Chinese Body Clock — Jam Aktif',txt:'<p><strong style="color:var(--gold)">07:00–09:00 (Lambung) dan 09:00–11:00 (Limpa)</strong> adalah dua jam berturut-turut yang paling penting untuk tubuhmu hari ini. Sarapan bergizi sebelum jam 09:00 dan aktivitas ringan setelahnya akan membuat sistem pencernaanmu bekerja dengan efisiensi tertinggi sepanjang hari.</p>',accent:'gold'},
  {ico:'⚠️',lbl:'Pantangan Kesehatan',txt:'<p>Mengganti rutinitas secara mendadak, melewatkan makan, atau tidur di jam yang berbeda dari biasanya. Tubuhmu hari ini sangat menyukai predictability — gangguan terhadap ritme regulermu akan terasa lebih berat dari biasanya.</p>',accent:'red'},
],
finance:[

  {ico:'🏦',lbl:'Tipe Investasi yang Sesuai',txt:'<p>Hari terbaik untuk instrumen investasi yang <strong style="color:var(--gold)">konservatif dan terstruktur</strong>: deposito, reksa dana pendapatan tetap, obligasi pemerintah, atau menabung secara konsisten. 正财 tidak menyukai spekulasi — ia menghargai keamanan dan pertumbuhan yang gradual tapi pasti.</p>',accent:'gold',tag:'good'},

  {ico:'💡',lbl:'Insight Finansial',txt:'<p>Kemakmuran yang dibangun dari 正财 mungkin tidak terlihat menarik dari luar — tidak ada cerita "dari nol jadi miliader dalam setahun". Tapi ia adalah jenis kemakmuran yang <strong style="color:var(--gold)">paling tahan banting dan paling sulit dihancurkan</strong>. Hargai proses ini.</p>',accent:'gold'},
  {ico:'✅',lbl:'Satu Aksi Finansial Terbaik',txt:'<p>Set up autodebit untuk tabungan atau investasi rutin jika belum ada. Otomasi adalah cara terbaik untuk menghormati energi 正财 — "bayar dirimu sendiri dulu" sebelum pengeluaran lainnya.</p>',accent:'teal'},
],
romance:[

  {ico:'💬',lbl:'Cara Komunikasi Terbaik',txt:'<p>Komunikasi yang <strong style="color:var(--gold)">konsisten dan reliable</strong> — membalas pesan tepat waktu, menepati janji kecil, hadir ketika dibutuhkan. Di hari 正财, tindakan berbicara jauh lebih keras dari kata-kata. Apa yang kamu lakukan (bukan ucapkan) hari ini akan diingat lebih lama.</p>',accent:'gold',wide:true},
  {ico:'💝',lbl:'Kekuatan Relasi',txt:'<p>Ketulusan dan kebaikan hatimu bersinar sangat natural hari ini. Orang-orang yang sudah mengenalmu akan merasakan betapa beruntungnya mereka memilikimu dalam hidup mereka — bahkan tanpa kamu harus mengucapkan apapun.</p>',accent:'gold',tag:'good'},
  {ico:'🐢',lbl:'Ritme yang Tepat',txt:'<p>Hari ini bukan untuk grand gesture atau momen yang dramatis — lebih cocok untuk <strong style="color:var(--gold)">koneksi yang tenang dan bermakna</strong>. Makan malam di rumah, berbagi cerita tentang hari, atau sekadar duduk bersama tanpa perlu berbuat banyak.</p>',accent:'dim'},
  {ico:'📍',lbl:'Lokasi & Aktivitas Ideal',txt:'<p>Tempat yang <strong style="color:var(--gold)">familiar, nyaman, dan penuh memori positif</strong> — rumah, restoran langganan, atau taman yang sering kamu kunjungi bersama. Energi 正财 tidak butuh kebaruan; ia butuh kedalaman dan kenyamanan yang sudah terbangun.</p>',accent:'teal',wide:true},
  {ico:'💡',lbl:'Insight untuk Relasi',txt:'<p>正财 mengajarkan bahwa <strong style="color:var(--gold)">cinta yang paling bertahan adalah yang dibangun dari kepercayaan yang dikumpulkan sedikit demi sedikit</strong>, bukan dari momen-momen besar yang jarang terjadi. Hari-hari "biasa" seperti ini adalah fondasi dari hubungan yang luar biasa.</p>',accent:'dim'},

  {ico:'🎯',lbl:'Tipe Pekerjaan Cocok',txt:'<p>Pekerjaan yang membutuhkan <strong style="color:var(--gold)">ketegasan, kepemimpinan di bawah tekanan, dan problem-solving krisis</strong>. Jika ada masalah besar yang sedang mengancam — hari ini kamu punya energi untuk menghadapinya secara langsung. Jangan hindari, hadapi.</p>',accent:'teal'},
  {ico:'👔',lbl:'Dinamika dengan Atasan & Tim',txt:'<p>Tekanan dari atasan hari ini kemungkinan lebih tinggi dari biasanya — tapi ingat: 七杀 yang terkontrol adalah simbol otoritas dan kekuasaan. Tunjukkan bahwa kamu bisa diandalkan di situasi sulit. Dengan tim: jaga nada bicara agar tekanan yang kamu rasakan tidak tumpah ke rekan-rekan yang tidak bersalah.</p>',accent:'red',wide:true,tag:'warn'},

  {ico:'💣',lbl:'Yang Harus Dihindari',txt:'<p>Konfrontasi tanpa persiapan matang, keputusan besar di bawah tekanan emosional, dan memaksakan diri secara fisik di luar batas kemampuan. Hari ini butuh kehati-hatian ekstra dalam setiap langkah.</p>',accent:'red',tag:'warn'},

health:[
  {ico:'🫀',lbl:'Organ yang Perlu Perhatian',txt:'<p>Paru-paru, tenggorokan, sistem pernapasan, dan kepala adalah area yang paling rentan di hari Metal-Wood clash. Tanda-tanda fisik dari tekanan hari ini: sesak dada, sakit kepala, atau tenggorokan yang terasa kencang — semua ini adalah sinyal tubuh bahwa stres perlu dikelola sekarang.</p>',accent:'gold',bar:{pct:42,cls:'red'}},
  {ico:'😰',lbl:'Level & Pola Energi',txt:'<p>Energi terasa seperti tali yang ditarik dari dua arah — kamu butuh banyak tapi sekaligus banyak yang menguras. Manajemen energi adalah skill terpenting hari ini: ketahui kapan harus maju dan kapan harus mundur untuk mengisi ulang.</p>',accent:'red',bar:{pct:40,cls:'red'}},
  {ico:'🌬️',lbl:'Aktivitas yang Dianjurkan',txt:'<p>Teknik pernapasan 4-7-8 (hirup 4 detik, tahan 7 detik, buang 8 detik) — lakukan 3-4 kali ketika merasa overwhelmed. Meditasi body scan selama 10 menit sebelum tidur untuk melepas ketegangan otot yang terakumulasi sepanjang hari.</p>',accent:'dim'},

  {ico:'🔇',lbl:'Pantangan Kesehatan',txt:'<p>Lingkungan bising, stimulasi berlebihan, dan olahraga intens yang memicu adrenalin tinggi. Semua ini akan memperburuk sistem saraf yang sudah dalam "combat mode". Pilih ketenangan kapanpun ada kesempatan.</p>',accent:'red',tag:'warn'},

  {ico:'🛡️',lbl:'Arus Rezeki',txt:'<p>Ini bukan hari untuk ekspansi finansial — ini hari untuk <strong style="color:var(--gold)">melindungi apa yang sudah ada</strong>. Seperti seorang prajurit yang lebih bijak untuk bertahan di balik perisai daripada menyerang di tengah badai.</p>',accent:'red',bar:{pct:35,cls:'red'}},
  {ico:'📊',lbl:'Tipe Investasi yang Sesuai',txt:'<p>Tidak ada yang ideal untuk dieksekusi hari ini. Jika ada posisi investasi yang sudah lama membuatmu khawatir — hari ini bisa menjadi waktu untuk melakukan stop-loss dan menerima kerugian kecil sebelum menjadi kerugian besar.</p>',accent:'dim'},
  {ico:'⚡',lbl:'Risiko Utama',txt:'<p>Pengeluaran mendadak akibat situasi darurat yang muncul tidak terduga — hal-hal mekanis (kendaraan, elektronik), atau kebutuhan yang tidak terencana. Pastikan kamu punya dana darurat yang mudah diakses hari ini.</p>',accent:'red',tag:'warn'},
  {ico:'🔢',lbl:'Angka & Arah Beruntung',txt:'${makeCompass("SE","Tenggara (SE) — Arah Sukses sebagai Perlindungan","Hari ini gunakan arah Tenggara bukan untuk ekspansi tapi untuk perlindungan. Kalau ada masalah finansial yang perlu diselesaikan, hadapi dengan posisi menghadap SE. Angka: 1, 6 (elemen Air — yang mengontrol dan menaklukkan Metal). Warna biru atau hitam bisa membantu menetralisir tekanan Metal hari ini.")}',accent:'teal',wide:true,raw:true},
  {ico:'💡',lbl:'Insight Finansial',txt:'<p>Kemampuan untuk <strong style="color:var(--gold)">bertahan dalam tekanan tanpa membuat keputusan buruk</strong> adalah skill finansial yang sangat langka dan berharga. Banyak orang kehilangan uang bukan karena investasi yang salah, tapi karena panik dan bereaksi di momen yang salah. Hari ini adalah latihan untuk skill itu.</p>',accent:'gold'},
  {ico:'✅',lbl:'Satu Aksi Finansial Terbaik',txt:'<p>Review dan pastikan dana daruratmu mencukupi minimal 3 bulan pengeluaran. Jika belum, buat rencana konkret untuk mencapai angka itu — mulai dengan berapa yang bisa kamu sisihkan minggu ini.</p>',accent:'dim'},

romance:[

  {ico:'💬',lbl:'Cara Komunikasi Terbaik',txt:'<p>Komunikasi yang <strong style="color:var(--gold)">pendek, jelas, dan tidak ambigu</strong>. Hari ini bukan waktu untuk percakapan panjang yang emosional atau diskusi tentang isu-isu yang sensitif. Semakin singkat dan jelas komunikasimu, semakin kecil peluang terjadinya miskomunikasi yang bisa memicu konflik.</p>',accent:'teal',wide:true},
  {ico:'🗝️',lbl:'Kekuatan Relasi',txt:'<p>Ketangguhan dan ketenangan yang kamu tunjukkan di bawah tekanan hari ini adalah daya tarik yang sangat powerful — jauh lebih menarik dari semua kata-kata romantis yang pernah kamu ucapkan. Pasanganmu melihatmu berjuang dan tetap tegak — itu meninggalkan kesan mendalam.</p>',accent:'gold',tag:'good'},
  {ico:'🌋',lbl:'Potensi Gesekan',txt:'<p>Stres hari ini bisa terbawa tanpa sadar ke interaksi dengan orang yang kamu sayangi. Sebelum pulang atau bertemu pasangan, lakukan "decompression ritual" kecil: 5 menit sendiri, tarik napas dalam, dan sadari bahwa mereka bukan penyebab tekananmu hari ini.</p>',accent:'red',tag:'warn'},
  {ico:'📍',lbl:'Lokasi & Aktivitas Ideal',txt:'<p>Tempat yang <strong style="color:var(--gold)">sunyi, natural, dan memberikan ruang untuk bernapas</strong> — taman sepi, pantai saat sepi, atau sekadar duduk di teras di malam hari. Alam memiliki kemampuan untuk menetralisir energi 七杀 yang keras. Berikan dirimu dan pasanganmu ruang untuk hadir tanpa tekanan.</p>',accent:'dim',wide:true},
  {ico:'💡',lbl:'Insight untuk Relasi',txt:'<p>七杀 dalam konteks asmara mengajarkan bahwa <strong style="color:var(--gold)">relasi yang kuat dibangun bukan di momen yang indah, tapi di saat-saat sulit</strong>. Bagaimana kamu dan pasanganmu melewati hari yang berat seperti ini bersama-sama — itulah ukuran sesungguhnya dari kekuatan hubungan kalian.</p>',accent:'teal'},

/* ══ ANIMATION ENGINE v2 ════════════════════════ */

/* ── IntersectionObserver: blur-to-sharp ── */
const revealObs = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      e.target.classList.add('in');
      revealObs.unobserve(e.target);
    }
  });
}, { threshold: 0.05, rootMargin: '0px 0px -30px 0px' });

function observeReveal() {
  document.querySelectorAll('.rv').forEach(el => {
    el.classList.remove('in');
    revealObs.observe(el);
  });
}

/* ── Ripple: works on BOTH touch AND mouse ── */
function spawnRipple(el, x, y) {
  el.style.position = 'relative';
  el.style.overflow = 'hidden';
  const r = document.createElement('div');
  r.className = 'ripple';
  const rect = el.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height) * 2.2;
  r.style.cssText = `
    position:absolute; border-radius:50%; pointer-events:none;
    width:${size}px; height:${size}px;
    left:${x - rect.left - size/2}px;
    top:${y - rect.top - size/2}px;
    background:radial-gradient(circle, rgba(200,149,58,.55) 0%, rgba(200,149,58,.15) 40%, transparent 70%);
    transform:scale(0); animation:rippleOut .8s cubic-bezier(.22,1,.36,1) forwards;
    z-index:999;
  `;
  el.appendChild(r);
  setTimeout(() => r.remove(), 900);
}

/* ── Lift + Glow ── */
function liftEl(el) {
  el.classList.add('lifted', 'glow-pulse');
}
function dropEl(el) {
  setTimeout(() => el.classList.remove('lifted', 'glow-pulse'), 350);
}

/* ── Unified pointer handler (touch + mouse) ── */
const LIFT_SELECTORS = '.rcard,.half,.score-row,.p-hero,.lp-card,.affirm-box,.chart-toggle,.read-btn,.hour-item';

function handlePointerDown(e) {
  const el = e.target.closest(LIFT_SELECTORS);
  if (!el) return;
  const x = e.touches ? e.touches[0].clientX : e.clientX;
  const y = e.touches ? e.touches[0].clientY : e.clientY;
  spawnRipple(el, x, y);
  liftEl(el);
  const up = () => { dropEl(el); document.removeEventListener('mouseup', up); document.removeEventListener('touchend', up); };
  document.addEventListener('mouseup', up, {once:true});
  document.addEventListener('touchend', up, {once:true});
}

document.addEventListener('mousedown', handlePointerDown, {passive:true});
document.addEventListener('touchstart', handlePointerDown, {passive:true});

/* ── Mist / Nebula ambient ── */
function initMist() {
  const canvas = document.getElementById('mist-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  let animId;

  function resize() {
    canvas.width  = canvas.parentElement.offsetWidth  || 400;
    canvas.height = canvas.parentElement.offsetHeight || 600;
  }
  resize();
  window.addEventListener('resize', resize);

  const blobs = [
    {x:.2, y:.3, r:160, vx:.0004, vy:.0002, h:38,  a:.10},
    {x:.8, y:.6, r:200, vx:-.0003, vy:.0004, h:38,  a:.08},
    {x:.5, y:.5, r:140, vx:.0002, vy:-.0003, h:175, a:.07},
    {x:.1, y:.8, r:120, vx:.0005, vy:-.0002, h:175, a:.06},
    {x:.9, y:.2, r:180, vx:-.0002, vy:.0005, h:38,  a:.09},
  ];
  let t = 0;

  function draw() {
    t += .4;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    blobs.forEach((b, i) => {
      const px = (b.x + Math.sin(t * b.vx * 80 + i) * .12) * canvas.width;
      const py = (b.y + Math.cos(t * b.vy * 80 + i) * .10) * canvas.height;
      const pr = b.r * (1 + .08 * Math.sin(t * .015 + i));
      const g = ctx.createRadialGradient(px, py, 0, px, py, pr);
      g.addColorStop(0,   `hsla(${b.h},65%,55%,${b.a})`);
      g.addColorStop(.5,  `hsla(${b.h},65%,45%,${b.a * .5})`);
      g.addColorStop(1,   `hsla(${b.h},65%,45%,0)`);
      ctx.beginPath();
      ctx.arc(px, py, pr, 0, Math.PI * 2);
      ctx.fillStyle = g;
      ctx.fill();
    });
    animId = requestAnimationFrame(draw);
  }
  draw();
  return () => cancelAnimationFrame(animId);
}

function buildSectionGrid(cells) {
  return cells.map(c => {
    const accCls = {gold:'accent-gold',teal:'accent-teal',red:'accent-red',dim:'accent-dim'}[c.accent||'dim']||'accent-dim';
    const wideCls = c.wide ? ' wide' : '';
    const tagHtml = c.tag ? `<span class="dg-tag tag-${c.tag}">${{good:'✓ Baik',warn:'⚠ Waspada',gold:'✦ Peluang',dim:''}[c.tag]||''}</span>` : '';
    const barHtml = c.bar ? `<div class="dg-bar-wrap"><div class="dg-bar ${c.bar.cls}" style="width:0%" data-pct="${c.bar.pct}"></div></div>` : '';
    // If raw, txt already contains full HTML (like compass)
    const bodyHtml = c.raw
      ? `<div class="dg-txt">${c.txt}</div>`
      : `<div class="dg-txt">${c.txt}${tagHtml}${barHtml}</div>`;
    return `<div class="dg-cell ${accCls}${wideCls}">
      <span class="dg-ico">${c.ico}</span>
      <span class="dg-lbl">${c.lbl}</span>
      ${bodyHtml}
    </div>`;
  }).join('');
}

function animateDgBars() {

}


/* ══ SUB-ACCORDION TOGGLE ══════════════════════ */
function toggleSub(btn) {
  const body = btn.nextElementSibling; // .sub-body
  const isOpen = btn.classList.contains('open');
  btn.classList.toggle('open', !isOpen);
  body.classList.toggle('open', !isOpen);
  // Animate progress bars on open
  if (!isOpen) {
    setTimeout(() => {
      body.querySelectorAll('.dg-bar').forEach(b => {
        b.style.width = (b.dataset.pct || 0) + '%';
      });
    }, 250);
    spawnRipple(btn,
      btn.getBoundingClientRect().left + btn.offsetWidth / 2,
      btn.getBoundingClientRect().top  + btn.offsetHeight / 2);
  }
}

function toggleChart() {
  const btn = document.querySelector('.ct-btn');
